name: Trade Republic Sync

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      last_days:
        description: 'Days of transactions to fetch (0 = all)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytr and Playwright
        run: |
          pip install pytr
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Restore credentials and session
        run: |
          mkdir -p ~/.pytr

          # Write credentials — two separate echo calls guarantees two lines.
          echo "${{ secrets.TR_PHONE }}" > ~/.pytr/credentials
          echo "${{ secrets.TR_PIN }}" >> ~/.pytr/credentials
          chmod 600 ~/.pytr/credentials

          # Sanity checks.
          echo "Lines: $(wc -l < ~/.pytr/credentials)"
          echo "Phone: $(head -1 ~/.pytr/credentials | sed 's/.*\(...\)\(....\)/+**\2/')"

          # Restore session cookies.
          PHONE=$(head -1 ~/.pytr/credentials)
          COOKIE_FILE="$HOME/.pytr/cookies.${PHONE}.txt"
          echo "${{ secrets.TR_COOKIES }}" | base64 -d > "$COOKIE_FILE"
          chmod 600 "$COOKIE_FILE"
          echo "Cookies size: $(wc -c < "$COOKIE_FILE") bytes"
          echo "Cookies path: cookies.${PHONE}.txt"

      - name: Fetch transactions
        env:
          LAST_DAYS: ${{ github.event.inputs.last_days || '7' }}
        run: |
          pytr export_transactions --export-format json --last_days "${LAST_DAYS}" --no-date-with-time /tmp/tr-transactions.json

      - name: Checkout app (for import script)
        uses: actions/checkout@v4

      - name: Import to Supabase
        run: node scripts/import-tr-to-supabase.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TR_USER_ID: ${{ secrets.TR_USER_ID }}
          TR_FUND_CATEGORY_ID: ${{ secrets.TR_FUND_CATEGORY_ID }}
