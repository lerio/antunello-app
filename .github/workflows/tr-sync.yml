name: Trade Republic Sync

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      last_days:
        description: 'Days of transactions to fetch (0 = all)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytr and Playwright
        run: |
          pip install pytr
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Restore credentials and session
        run: |
          mkdir -p ~/.pytr

          # Credentials file — line 1: phone, line 2: PIN
          printf '%s\n' "${{ secrets.TR_PHONE }}" > ~/.pytr/credentials
          printf '%s'   "${{ secrets.TR_PIN }}" >> ~/.pytr/credentials
          chmod 600 ~/.pytr/credentials

          # Restore session cookies from base64-encoded secret.
          # pytr names the cookies file as "cookies.{phone_number}.txt".
          # Read the phone number back from the credentials file to get the
          # exact filename pytr will look for.
          PHONE=$(head -1 ~/.pytr/credentials)
          echo "${{ secrets.TR_COOKIES }}" | base64 -d > "$HOME/.pytr/cookies.${PHONE}.txt"
          chmod 600 "$HOME/.pytr/cookies.${PHONE}.txt"

      - name: Fetch transactions
        env:
          LAST_DAYS: ${{ github.event.inputs.last_days || '7' }}
        run: |
          pytr export_transactions --export-format json --last_days "${LAST_DAYS}" --no-date-with-time /tmp/tr-transactions.json

      - name: Checkout app (for import script)
        uses: actions/checkout@v4

      - name: Import to Supabase
        run: node scripts/import-tr-to-supabase.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TR_USER_ID: ${{ secrets.TR_USER_ID }}
          TR_FUND_CATEGORY_ID: ${{ secrets.TR_FUND_CATEGORY_ID }}
