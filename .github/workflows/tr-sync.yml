name: Trade Republic Sync

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      last_days:
        description: 'Days of transactions to fetch (0 = all)'
        required: false
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytr and Playwright
        run: |
          pip install pytr
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Restore credentials and session
        env:
          TR_PHONE: ${{ secrets.TR_PHONE }}
          TR_PIN: ${{ secrets.TR_PIN }}
          TR_COOKIES_B64: ${{ secrets.TR_COOKIES }}
        run: |
          mkdir -p ~/.pytr

          # Debug: check secret lengths (not contents)
          echo "TR_PHONE length: ${#TR_PHONE}"
          echo "TR_PIN length: ${#TR_PIN}"
          echo "TR_COOKIES_B64 length: ${#TR_COOKIES_B64}"

          if [ -z "$TR_PHONE" ]; then
            echo "ERROR: TR_PHONE is empty — check GitHub secret"
            exit 1
          fi
          if [ -z "$TR_PIN" ]; then
            echo "ERROR: TR_PIN is empty — check GitHub secret"
            exit 1
          fi
          if [ -z "$TR_COOKIES_B64" ]; then
            echo "ERROR: TR_COOKIES is empty — check GitHub secret"
            exit 1
          fi

          # Write credentials.
          printf '%s\n' "$TR_PHONE" > ~/.pytr/credentials
          printf '%s\n' "$TR_PIN" >> ~/.pytr/credentials
          chmod 600 ~/.pytr/credentials

          # Decode and write cookies.
          COOKIE_FILE="$HOME/.pytr/cookies.${TR_PHONE}.txt"
          printf '%s' "$TR_COOKIES_B64" | base64 -d > "$COOKIE_FILE"
          chmod 600 "$COOKIE_FILE"

          echo "Credentials lines: $(wc -l < ~/.pytr/credentials)"
          echo "Cookies size: $(wc -c < "$COOKIE_FILE") bytes"
          echo "Cookies path: cookies.${TR_PHONE}.txt"

      - name: Fetch transactions
        env:
          LAST_DAYS: ${{ github.event.inputs.last_days || '7' }}
        run: |
          pytr export_transactions --export-format json --last_days "${LAST_DAYS}" --no-date-with-time /tmp/tr-transactions.json

      - name: Checkout app (for import script)
        uses: actions/checkout@v4

      - name: Import to Supabase
        run: node scripts/import-tr-to-supabase.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TR_USER_ID: ${{ secrets.TR_USER_ID }}
          TR_FUND_CATEGORY_ID: ${{ secrets.TR_FUND_CATEGORY_ID }}
